<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>404 • Page not valid</title>
  <!-- A clean, modern 404 design with subtle motion and clear messaging -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, 'Segoe UI', Roboto, 'Helvetica Neue', 'Open Sans', sans-serif;
      background: #f9fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      background: radial-gradient(circle at 30% 30%, #ffffff 0%, #f2f5f9 100%);
    }

    .error-container {
      max-width: 680px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      background: #ffffff;
      border-radius: 2.5rem;
      padding: 3rem 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.06), 0 10px 25px rgba(0, 0, 0, 0.03);
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.02);
      transition: transform 0.2s ease;
    }

    @media (max-width: 480px) {
      .error-container {
        padding: 2.5rem 1.5rem;
        border-radius: 2rem;
      }
    }

    .status-code {
      font-size: clamp(7rem, 20vw, 10rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #1e293b 0%, #3b4b62 80%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.25rem;
      filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.06));
      user-select: none;
    }

    .badge {
      display: inline-block;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding: 0.4rem 1.4rem;
      border-radius: 40px;
      margin-bottom: 1.8rem;
      background: #fef2f2;
      border: 1px solid #ffdcdc;
      backdrop-filter: blur(4px);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 0.9rem;
      letter-spacing: -0.4px;
      line-height: 1.3;
    }

    .description {
      font-size: 1.1rem;
      color: #475569;
      margin-bottom: 2.2rem;
      line-height: 1.6;
      font-weight: 400;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
    }

    .invalid-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin-bottom: 1.8rem;
    }

    .invalid-icon span {
      background: #f1f5f9;
      padding: 0.6rem 1.3rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid #e2e8f0;
      background: #f8fafc;
    }

    .invalid-icon span::before {
      content: "⚠️";
      font-size: 1rem;
      margin-right: 0.3rem;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 0.8rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #0f172a;
      color: white;
      font-weight: 550;
      font-size: 0.95rem;
      padding: 0.8rem 1.8rem;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.25s ease;
      border: 1px solid transparent;
      background: #1e293b;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.1);
      letter-spacing: 0.01em;
      backdrop-filter: blur(4px);
    }

    .btn:hover {
      background: #0f172a;
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.15);
      transform: translateY(-2px);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .btn-secondary {
      background: transparent;
      color: #1e293b;
      border: 1px solid #d1d5db;
      box-shadow: none;
      background: #ffffff;
      font-weight: 500;
    }

    .btn-secondary:hover {
      background: #f9fafb;
      border-color: #9ca3af;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.03);
      color: #0f172a;
    }

    .footer-note {
      margin-top: 2.5rem;
      font-size: 0.85rem;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .footer-note svg {
      width: 16px;
      height: 16px;
      opacity: 0.7;
    }

    .divider {
      width: 50px;
      height: 2px;
      background: #e2e8f0;
      margin: 1.8rem auto;
      border-radius: 10px;
    }

    /* subtle animation for the status code */
    @keyframes softPulse {
      0% { opacity: 0.95; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.02); }
      100% { opacity: 0.95; transform: scale(1); }
    }

    .status-code {
      animation: softPulse 4s infinite ease-in-out;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <!-- Large 404 with gradient text -->
    <div class="status-code">404</div>
    
    <!-- Small invalid badge -->
    <div class="badge">This page is not valid</div>
    
    <h1>We can't find that page</h1>
    
    <div class="invalid-icon">
      <span>Invalid address</span>
    </div>
    
    <p class="description">
      The link you followed may be broken, or the page might have been moved or never existed.
      Let's get you back on track.
    </p>
    
    <div class="divider"></div>
    
    <!-- Action buttons -->
    <div class="button-group">
      <a href="/" class="btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        Back to home
      </a>
      
      <a href="javascript:history.back()" class="btn btn-secondary">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Previous page
      </a>
    </div>
    
    <!-- Optional help text -->
    <div class="footer-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <span>If you think this is a mistake, <a href="/contact" style="color:#1e293b; text-decoration: underline; font-weight: 500;">contact us</a>.</span>
    </div>
  </div>
</body>
</html>
